name: GH-Actions
on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - "**"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Run Lunar CI Agent
        uses: earthly/lunar-ci-action@v1.1.4
        env:
          LUNAR_HUB_TOKEN: ${{ secrets.LUNAR_HUB_TOKEN }}
          LUNAR_HUB_HOST: cronos.demo.earthly.dev
          LUNAR_HUB_GRPC_PORT: "443"
          LUNAR_HUB_HTTP_PORT: "443"
          LUNAR_LOG_LEVEL: debug

      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.21"

      - name: Go build
        run: go build ./...

      - name: Go test
        run: go test -v ./...
